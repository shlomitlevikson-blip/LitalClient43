<p>P2</p>
<div class="row">
    <div class="col-6">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>PartCode</th>
                    <th>PartName</th>
                    <th>Price</th>
                    <th>IsAvailable</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let part of parts$ | async">
                    <td>{{part.id}}</td>
                    <td>{{part.partCode}}</td>
                    <td>{{part.partName}}</td>
                    <td>{{part.price}}</td>
                    <td>{{part.isAvailable}}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
